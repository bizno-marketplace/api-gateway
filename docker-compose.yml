services:
  api-gateway:
    build: .
    image: bizno/api-gateway:local
    container_name: api-gateway
    restart: unless-stopped
    environment:
      - DISCOVERY_SERVER_URL=http://discovery-server:8761/eureka/
      # ASSUNÇÃO: confirma o nome real da propriedade/env var usada para
      # spring.config.import: configserver:... e ajusta se for diferente.
      - CONFIG_SERVER_URL=http://config-server:8888
      - LOKI_URL=http://loki:3100
    ports:
      - "8080:8080"   # main port
      - "9080:9080"   # management port
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - bizno-net
    # IMPORTANTE: sobe discovery-server e config-server primeiro
    # (docker compose separados). depends_on não funciona entre stacks.

networks:
  bizno-net:
    external: true