server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVER_URL:http://localhost:8761/eureka/}

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8887}"
  cloud:
    config:
      fail-fast: false

management:
  server:
    port: 9080
  tracing:
    sampling:
      probability: 1.0
    export:
      zipkin:
        endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

loki:
  url: ${LOKI_URL:http://localhost:3100}